monitor=,highres,auto,1,bitdepth,8

# << Autostart >>
exec-once = hyprpaper & waybar & /run/current-system/sw/libexec/polkit-kde-authentication-agent-1 & mako
exec-once = systemctl --user start hypridle
exec-once = opensnitch-ui

# << Unique configs >>
source = /etc/nixos/dotfiles/hypr/unique.hyprland.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland

general {
    gaps_in = 1
    gaps_out = 5
    border_size = 2
    col.active_border = rgb(7EBAE4)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
    allow_tearing = true
}

debug {
	#disable_logs=false
}

decoration {
    rounding = 1
    
    blur {
        enabled = true
        size = 3
        passes = 1
    }
	
    active_opacity = 1
    inactive_opacity = 0.86
    fullscreen_opacity = 1
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    # new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    # workspace_swipe = off
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
# device:epic-mouse-v1 {
#    sensitivity = -0.5
# }

misc {
  enable_anr_dialog = false
}

# << Window Rules >>

windowrule {
  name = lsp-plugins
  match:class = lsp-plugins
  workspace = 2
  opacity = 1.0
  no_blur = on
  no_anim = on
  opaque = on
  float = on
}

windowrule {
  name = steam-games
  match:class = steam_app_*
  opaque = on
  no_blur = on
  float = on
  no_anim = on
  sync_fullscreen = on
  immediate = on
  no_shadow = on
  decorate = off
}

layerrule {
  name = mako
  xray = on
  blur = on
  no_screen_share = on
  ignore_alpha = 0.1
  match:namespace = ^notifications$
}

# << Keybinds >>

$mainMod = SUPER

bind = $mainMod, Q, exec, alacritty
bind = $mainMod, C, killactive, 
bind = $mainMod SHIFT, L, exec, hyprlock
bind = $mainMod SHIFT ALT, E, exit
bind = $mainMod, E, exec, nemo
bind = $mainMod, V, togglefloating, 
bind = $mainMod, R, exec, rofi -show drun
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod SHIFT, R, exec, rofi -show window
bind = $mainMod SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim - | wl-copy
bind = $mainMod, F,fullscreen,
bind = $mainMod SHIFT, End, exec, waybar
bind = $mainMod SHIFT, Home, exec, bash .util/pa_web_ctl/pa_mixer.sh

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = , XF86MonBrightnessDown, exec, brightnessctl "10%-"
bind = , XF86MonBrightnessUp, exec, brightnessctl "+10%"
bind = , XF86AudioRaiseVolume, exec, pamixer -i 2
bind = , XF86AudioLowerVolume, exec, pamixer -d 2
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# << DBUS >>

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
